<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineB</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── LOGIN SCREEN ──────────────────────────────────────────────────── -->

  <div class="login-screen hidden" id="loginScreen">

    <!-- Profile picker -->
    <div class="profile-picker" id="profilePicker">
      <h1 class="profile-heading">Who's watching?</h1>
      <div class="profile-cards" id="profileCards"></div>
    </div>

    <!-- PIN entry -->
    <div class="pin-screen hidden" id="pinScreen">
      <p class="pin-for" id="pinFor"></p>
      <div class="pin-dots">
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
      </div>
      <p class="pin-error hidden" id="pinError">Incorrect PIN. Please try again.</p>
      <div class="pin-keypad" id="pinKeypad"></div>
      <button class="pin-back" id="pinBack">← Back to profiles</button>
    </div>

  </div>

  <!-- ── BROWSE UI ──────────────────────────────────────────────────────── -->

  <nav class="nav" id="nav">
    <div class="nav-left">
      <span class="nav-logo">JACKFLIX</span>
      <ul class="nav-links">
        <li class="nav-link active" data-filter="all">Home</li>
        <li class="nav-link" data-filter="movie">Movies</li>
        <li class="nav-link" data-filter="tv">TV Shows</li>
      </ul>
    </div>
    <div class="nav-right">
      <div class="search-wrap" id="searchWrap">
        <button class="search-icon-btn" id="searchToggle">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="white" viewBox="0 0 24 24">
            <path d="M21 20l-5.15-5.15A7 7 0 1 0 4 10a7 7 0 0 0 11.85 5.85L21 21l-.01-.01zM10 15a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
          </svg>
        </button>
        <input type="text" class="search-input" id="searchInput" placeholder="Search titles, people...">
      </div>
    </div>
  </nav>

  <section class="hero" id="hero">
    <div class="hero-backdrop" id="heroBackdrop"></div>
    <div class="hero-vignette"></div>
    <div class="hero-content" id="heroContent">
      <div class="hero-badge" id="heroBadge"></div>
      <h1 class="hero-title" id="heroTitle">Loading...</h1>
      <p class="hero-overview" id="heroOverview"></p>
      <div class="hero-meta" id="heroMeta"></div>
      <div class="hero-actions">
        <button class="btn btn-play" id="heroPlay">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          Play
        </button>
        <button class="btn btn-info" id="heroInfo">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
          More Info
        </button>
      </div>
    </div>
  </section>

  <main class="content" id="content"></main>

  <!-- ── DETAIL MODAL ────────────────────────────────────────────────────── -->

  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="white" viewBox="0 0 24 24">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
      <div class="modal-hero">
        <img class="modal-backdrop" id="modalBackdrop" src="" alt="">
        <div class="modal-hero-vignette"></div>
        <div class="modal-hero-info">
          <h2 class="modal-title" id="modalTitle"></h2>
          <div class="modal-actions">
            <button class="btn btn-play" id="modalPlay">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              Play
            </button>
          </div>
        </div>
      </div>
      <div class="modal-body">
        <div class="modal-cols">
          <div class="modal-col-main">
            <div class="modal-meta" id="modalMeta"></div>
            <p class="modal-overview" id="modalOverview"></p>
          </div>
          <div class="modal-col-side" id="modalSide"></div>
        </div>
        <div class="episodes-section hidden" id="episodesSection">
          <div class="episodes-header">
            <h3 class="episodes-heading">Episodes</h3>
            <select class="season-select" id="seasonSelect"></select>
          </div>
          <div class="episode-list" id="episodeList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── SEARCH RESULTS ─────────────────────────────────────────────────── -->

  <div class="search-results hidden" id="searchResults"></div>

  <!-- ── VIDEO PLAYER OVERLAY ───────────────────────────────────────────── -->

  <div class="vp-overlay hidden" id="vpOverlay">

    <!-- Native video element -->
    <video class="vp-video" id="vpVideo" preload="auto"></video>

    <!-- Loading / error state -->
    <div class="vp-loading" id="vpLoading">
      <div class="vp-loading-ring"></div>
      <p class="vp-loading-msg" id="vpLoadingMsg">Finding stream…</p>
      <p class="vp-loading-sub" id="vpLoadingSub"></p>
    </div>

    <!-- Buffering indicator (shown during playback stalls) -->
    <div class="vp-buf-ring hidden" id="vpBufRing"></div>

    <!-- Custom controls — auto-hide after 3s inactivity -->
    <div class="vp-controls" id="vpControls">

      <!-- Top bar: back + title + server selector -->
      <div class="vp-top">
        <div class="vp-top-left">
          <button class="vp-btn vp-back-btn" id="vpBack">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          </button>
          <span class="vp-title" id="vpTitle"></span>
          <!-- Episodes drawer toggle (TV only) -->
          <button class="vp-btn vp-ep-list-btn hidden" id="vpEpListBtn" title="Episodes">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
            <span style="font-size:12px;margin-left:4px">Episodes</span>
          </button>
        </div>
        <div class="vp-top-right">
          <span class="vp-srv-label">Server</span>
          <div class="vp-srv-btns" id="vpSrvBtns">
            <button class="vp-srv-btn active" data-s="0">1</button>
            <button class="vp-srv-btn" data-s="1">2</button>
            <button class="vp-srv-btn" data-s="2">3</button>
          </div>
        </div>
      </div>

      <!-- Bottom: seek + buttons -->
      <div class="vp-bottom">

        <!-- Seek bar -->
        <div class="vp-seek-wrap" id="vpSeekWrap">
          <div class="vp-seek-track" id="vpSeekTrack">
            <div class="vp-seek-buf"  id="vpSeekBuf"></div>
            <div class="vp-seek-fill" id="vpSeekFill"></div>
            <div class="vp-seek-dot"></div>
          </div>
          <div class="vp-seek-tip" id="vpSeekTip"></div>
        </div>

        <!-- Buttons row -->
        <div class="vp-btns">
          <div class="vp-btns-l">

            <!-- Play / Pause -->
            <button class="vp-btn" id="vpPlayBtn">
              <svg class="ico-pause" width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
              <svg class="ico-play  hidden" width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
            </button>

            <!-- Skip back 10s -->
            <button class="vp-btn vp-skip-btn" id="vpSkipBack" title="Back 10s">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="white">
                <path d="M11.99 5V1l-5 5 5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h-2c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
              </svg>
              <span class="vp-skip-num">10</span>
            </button>

            <!-- Skip forward 10s -->
            <button class="vp-btn vp-skip-btn" id="vpSkipFwd" title="Forward 10s">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="white">
                <path d="M18 13c0 3.31-2.69 6-6 6s-6-2.69-6-6 2.69-6 6-6v4l5-5-5-5v4c-4.42 0-8 3.58-8 8s3.58 8 8 8 8-3.58 8-8h-2z"/>
              </svg>
              <span class="vp-skip-num">10</span>
            </button>

            <!-- Previous episode (TV only) -->
            <button class="vp-btn hidden" id="vpPrevEp" title="Previous Episode">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
            </button>

            <!-- Next episode (TV only) -->
            <button class="vp-btn hidden" id="vpNextEp" title="Next Episode">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>

            <!-- Volume -->
            <div class="vp-vol-wrap">
              <button class="vp-btn" id="vpMute">
                <svg class="ico-vol" width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                <svg class="ico-mute hidden" width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
              </button>
              <input class="vp-vol-slider" id="vpVolSlider" type="range" min="0" max="1" step="0.02" value="1">
            </div>

            <!-- Time -->
            <span class="vp-time" id="vpTime">0:00 / 0:00</span>
          </div>

          <div class="vp-btns-r">
            <!-- Quality selector -->
            <div class="vp-quality-wrap" id="vpQualityWrap">
              <button class="vp-btn vp-quality-btn" id="vpQualityBtn">Auto</button>
              <div class="vp-quality-menu hidden" id="vpQualityMenu"></div>
            </div>
            <!-- Fullscreen -->
            <button class="vp-btn" id="vpFs">
              <svg class="ico-fs-in"  width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
              <svg class="ico-fs-out hidden" width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
            </button>
          </div>
        </div>

      </div>
    </div><!-- /vp-controls -->

    <!-- Episode panel — slides in from right while player is open -->
    <div class="vp-ep-panel hidden" id="vpEpPanel">
      <div class="vp-ep-panel-head">
        <h3 class="vp-ep-panel-title">Episodes</h3>
        <select class="vp-ep-season-sel" id="vpEpSeasonSel"></select>
        <button class="vp-btn" id="vpEpPanelClose">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div class="vp-ep-panel-list" id="vpEpPanelList">
        <div class="spinner"></div>
      </div>
    </div>

  </div><!-- /vp-overlay -->

  <div class="app-version">v1.6</div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <script src="player.js"></script>
  <script src="app.js"></script>
</body>
</html>
